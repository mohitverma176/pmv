<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Me - Student Portfolio</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500&family=Space+Grotesk:wght@400;600;700&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>

<body>
    <header>
        <nav class="navbar">
            <div class="logo">MyPortfolio</div>
            <ul class="nav-links">
                <li><a href="index.html">Home</a></li>
                <li><a href="about.html">About</a></li>
                <li><a href="projects.html">Projects</a></li>
                <li><a href="contact.html" class="active">Contact</a></li>
            </ul>
            <div class="hamburger">
                <span class="bar"></span>
                <span class="bar"></span>
                <span class="bar"></span>
            </div>
        </nav>
    </header>

    <main class="container">
        <div class="contact-container">
            <div class="contact-info hidden">
                <h2>Let's build<br>something<br>great.</h2>

                <div class="info-item">
                    <i class="fas fa-envelope"></i>
                    <span>mohitverma1766@gmail.com</span>
                </div>
                <div class="info-item">
                    <i class="fas fa-map-marker-alt"></i>
                    <span>New Dehli, ND</span>
                </div>

                <div class="social-links">
                    <a href="https://github.com/mohitverma176" class="social-icon"><i class="fab fa-github"></i></a>
                    <a href="#" class="social-icon"><i class="fab fa-linkedin-in"></i></a>
                   
                    <a href="#" class="social-icon"><i class="fab fa-dribbble"></i></a>
                </div>
            </div>

            <form class="contact-form hidden delay-200">
                <input type="text" id="name" placeholder="What's your name?" required>
                <input type="email" id="email" placeholder="Your email address" required>
                <textarea id="message" rows="4" placeholder="Tell me about your project" required></textarea>
                <button type="submit" class="cta-button">Send Request</button>
            </form>
        </div>
    </main>



    
    <footer>

    </footer>

    <script src="script.js"></script>
</body>

</html>
